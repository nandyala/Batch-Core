# =============================================================================
# application.properties  —  BASE configuration (lowest priority)
# =============================================================================
#
# Override any value here using the sources below (highest → lowest):
#
#   Priority  Source                              How to activate
#   ────────  ──────────────────────────────────  ────────────────────────────
#   1 (high)  CLI key=value args                  java -jar app.jar job key=val
#   2         JVM system property                 java -Dkey=value -jar app.jar
#   3         OS environment variable             export KEY=value
#   4         External config file                -Dapp.config.file=/path/f.props
#   5         Profile file                        -Dapp.profile=prod
#   6 (low)   THIS FILE                           always loaded
#
# Profile files (classpath):
#   application-dev.properties   — local developer machine
#   application-uat.properties   — UAT / staging
#   application-prod.properties  — production
#
# External file (filesystem, per-host overrides):
#   java -Dapp.config.file=/etc/batch/eu-west.properties -jar app.jar my-job
#
# Sensitive values — never hard-code secrets here. Use OS env vars:
#   datasource.password=${DB_PASSWORD}
# =============================================================================

# ---------------------------------------------------------------------------
# PRIMARY DataSource — main business DB + Spring Batch metadata tables
# ---------------------------------------------------------------------------
datasource.driverClassName=com.microsoft.sqlserver.jdbc.SQLServerDriver
datasource.url=jdbc:sqlserver://localhost:1433;databaseName=batchdb;encrypt=false;trustServerCertificate=true
datasource.username=sa
datasource.password=Passw0rd

# HikariCP pool (primary)
datasource.pool.maxSize=10
datasource.pool.minIdle=2
datasource.pool.connectionTimeoutMs=30000
datasource.pool.idleTimeoutMs=600000
datasource.pool.maxLifetimeMs=1800000

# ---------------------------------------------------------------------------
# SECONDARY DataSource — reporting / secondary business DB
# Override in application-prod.properties to point at a different server.
# If you only have one database, set these to the same values as primary.
# ---------------------------------------------------------------------------
datasource.secondary.url=jdbc:sqlserver://localhost:1433;databaseName=reportingdb;encrypt=false;trustServerCertificate=true
datasource.secondary.username=sa
datasource.secondary.password=Passw0rd
# Pool (smaller — secondary is read-heavy, lower concurrency)
datasource.secondary.pool.maxSize=5
datasource.secondary.pool.minIdle=1

# ---------------------------------------------------------------------------
# Spring Batch schema  (set false once BATCH_* tables exist in the DB)
# ---------------------------------------------------------------------------
batch.schema.initialize=false

# ---------------------------------------------------------------------------
# Run statistics schema + retention
# Set batch.stats.schema.initialize=false once BATCH_JOB_RUN_STATS / BATCH_STEP_RUN_STATS exist.
# Records older than batch.stats.retention.days are pruned automatically after each job run.
# ---------------------------------------------------------------------------
batch.stats.schema.initialize=false
batch.stats.retention.days=7

# ---------------------------------------------------------------------------
# Email / SMTP
# ---------------------------------------------------------------------------
mail.smtp.host=smtp.example.com
mail.smtp.port=587
mail.smtp.username=CHANGEME
mail.smtp.password=CHANGEME
mail.smtp.auth=true
mail.smtp.starttls.enable=true
mail.smtp.ssl.trust=*
mail.debug=false
mail.from=batch-notifications@example.com

# Default recipient for the job statistics email (override per-job or per-env)
batch.report.email=ops-team@example.com

# Feature flag: set to false to disable email sending (log report still runs)
batch.email.enabled=false

# ---------------------------------------------------------------------------
# Job-specific settings
# ---------------------------------------------------------------------------
batch.sample.commitInterval=5

# db-to-file-job
batch.dbtofile.commitInterval=100
batch.dbtofile.outputDir=/data/batch/output

# file-to-db-job
batch.filetodb.commitInterval=200
batch.filetodb.inputDir=/data/batch/input

# multithreaded-job
batch.multithreaded.commitInterval=50
batch.multithreaded.threadCount=4
batch.multithreaded.pageSize=50

# mt-db-to-file-job  (multi-threaded DB → file via JdbcPagingItemReader + SynchronizedItemStreamWriter)
batch.mtdbtofile.commitInterval=100
batch.mtdbtofile.threadCount=4
batch.mtdbtofile.pageSize=100

# mt-file-to-db-job  (multi-threaded file → DB via SynchronizedItemStreamReader + JdbcBatchItemWriter)
batch.mtfiletodb.commitInterval=200
batch.mtfiletodb.threadCount=4

# partitioned-db-to-file-job  (partitioned DB → per-partition CSV via ColumnRangePartitioner)
# gridSize controls how many ID-range partitions (and worker threads) are created.
# outputDir can differ from batch.dbtofile.outputDir if partition files go to a separate folder.
batch.partitioned.commitInterval=100
batch.partitioned.gridSize=4
batch.partitioned.outputDir=/data/batch/output/partitioned
