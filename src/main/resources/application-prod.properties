# =============================================================================
# application-prod.properties  —  Production overrides
# Activate with:  java -Dapp.profile=prod -jar app.jar <job-slug>
#
# Secrets MUST come from environment variables — never hard-code here.
# Set in your pipeline secrets / Kubernetes secret / systemd EnvironmentFile.
# =============================================================================

datasource.url=jdbc:sqlserver://prod-db-server:1433;databaseName=batchdb_prod;encrypt=true;trustServerCertificate=false
datasource.username=batch_prod
datasource.password=${DB_PASSWORD}

datasource.pool.maxSize=20
datasource.pool.minIdle=5
datasource.pool.connectionTimeoutMs=15000
datasource.pool.idleTimeoutMs=300000
datasource.pool.maxLifetimeMs=900000

# Tables already exist in production — never re-run DDL
batch.schema.initialize=false

mail.smtp.host=smtp.company.com
mail.smtp.port=587
mail.smtp.username=${SMTP_USER}
mail.smtp.password=${SMTP_PASSWORD}
mail.smtp.auth=true
mail.smtp.starttls.enable=true
mail.smtp.ssl.trust=smtp.company.com
mail.debug=false
mail.from=batch-noreply@company.com

batch.report.email=ops-team@company.com

batch.sample.commitInterval=100
