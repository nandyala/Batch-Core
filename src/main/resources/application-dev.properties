# =============================================================================
# application-dev.properties  —  Local developer machine overrides
# Activate with:  java -Dapp.profile=dev -jar app.jar <job-slug>
# =============================================================================

# Local SQL Server (or Docker)
datasource.url=jdbc:sqlserver://localhost:1433;databaseName=batchdb_dev;encrypt=false;trustServerCertificate=true
datasource.username=sa
datasource.password=DevPassword123!

# Smaller pool for local machine
datasource.pool.maxSize=3
datasource.pool.minIdle=1

# Always recreate schema in dev
batch.schema.initialize=true

# MailHog or Mailtrap for local email testing  (http://localhost:8025)
mail.smtp.host=localhost
mail.smtp.port=1025
mail.smtp.username=
mail.smtp.password=
mail.smtp.auth=false
mail.smtp.starttls.enable=false
mail.smtp.ssl.trust=*
mail.debug=true
mail.from=dev-batch@localhost

batch.report.email=developer@example.com

# Smaller commit interval for faster feedback during dev
batch.sample.commitInterval=2
