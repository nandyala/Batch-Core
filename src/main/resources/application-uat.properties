# =============================================================================
# application-uat.properties  —  UAT / Staging overrides
# Activate with:  java -Dapp.profile=uat -jar app.jar <job-slug>
# =============================================================================

datasource.url=jdbc:sqlserver://uat-db-server:1433;databaseName=batchdb_uat;encrypt=true;trustServerCertificate=false
datasource.username=batch_uat
datasource.password=${DB_PASSWORD_UAT}

datasource.pool.maxSize=5
datasource.pool.minIdle=1

# Tables already exist in UAT — do not re-run DDL
batch.schema.initialize=false

mail.smtp.host=smtp.company.com
mail.smtp.port=587
mail.smtp.username=${SMTP_USER}
mail.smtp.password=${SMTP_PASSWORD}
mail.smtp.auth=true
mail.smtp.starttls.enable=true
mail.from=uat-batch@company.com

batch.report.email=qa-team@company.com

batch.sample.commitInterval=10
